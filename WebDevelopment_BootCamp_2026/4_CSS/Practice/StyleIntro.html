<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Style Sheet</title>

        <style>
            h2 {
                color: deeppink;
            }

            button {
                background-color: cornflowerblue;
            }
        </style>
    </head>

    <body>
        <h1>Styles</h1>

        <!-- INLINE STYLES -->
        <h2 style="color: darkolivegreen">Heading 2</h2>
        <button style="background-color: lightsalmon">Click me</button>

        <!-- HEADING STYLE -->
        <h2>Heading 3</h2>
        <button>Click me</button>
    </body>
</html>
